<!DOCTYPE html>
<html>
<head>
<title>My CSS Webpage</title>

<style>

/* ===== PAGE STYLE ===== */
body{
font-family:"Courier New", monospace;
text-align:center;
margin:0;
padding:0;
background:linear-gradient(to bottom,#ffffff,#dbeafe);
}

/* ===== SPLASH SCREEN ===== */
#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#222;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

#splash button{
padding:15px 30px;
font-size:20px;
cursor:pointer;
border:none;
border-radius:8px;
box-shadow:0px 6px 15px rgba(0,0,0,0.5);
}

/* ===== TEXT ===== */
h1{
color:red;
}

p{
color:blue;
font-size:30px;
font-family:Fantasy;
}

.intro{
font-weight:bold;
color:darkblue;
}

/* ===== BOX CONTAINER ===== */
.container{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

/* ===== DEPTH BOXES ===== */
.box{
border:2px solid blue;
background-color:lightblue;
padding:20px;
width:100px;
border-radius:10px;
box-shadow:0px 6px 15px rgba(0,0,0,0.4);
transition:transform 0.3s;
}

.box:hover{
transform:translateY(-8px);
}

/* ===== MUSIC BUTTONS ===== */
.musicBtn{
padding:10px 20px;
font-size:16px;
margin:5px;
cursor:pointer;
border:none;
border-radius:6px;
background-color:#3b82f6;
color:white;
box-shadow:0px 5px 10px rgba(0,0,0,0.4);
transition:transform 0.2s;
}

.musicBtn:hover{
transform:scale(1.1);
}

/* ===== FOOTER ===== */
footer{
background-color:blue;
color:white;
padding:10px;
margin-top:20px;
}

</style>
</head>

<body>

<!-- ===== SPLASH SCREEN ===== -->
<div id="splash">
<h1>Welcome to My Web Page</h1>
<p>Click below to enter and start music</p>
<button id="enterBtn">Enter Site</button>
</div>

<!-- ===== MAIN CONTENT ===== -->
<div id="mainContent" style="display:none;">

<h1>Welcome to My Web Page</h1>

<p class="intro">Enjoy some music while browsing my website.</p>

<h2>Music Player</h2>

<audio id="bgMusic"></audio>

<br><br>

<button class="musicBtn" id="prevBtn">⏮ Previous</button>
<button class="musicBtn" id="playPauseBtn">Pause</button>
<button class="musicBtn" id="nextBtn">Next ⏭</button>

<p>This paragraph is styled using embedded CSS.</p>

<div class="container">
<div class="box">Box 1</div>
<div class="box">Box 2</div>
<div class="box">Box 3</div>
<div class="box">Box 4</div>
</div>

<footer>
<p>My Website 2026</p>
</footer>

</div>

<script>

/* ===== PLAYLIST ===== */
var playlist=[
"remember.mp3",
"lose.mp3",
"lonely.mp3",
"foryou.mp3",
"ant.mp3",
"music.mp3"
];

var music=document.getElementById("bgMusic");
var currentSong=0;

/* ENTER SITE + START MUSIC */
document.getElementById("enterBtn").addEventListener("click",function(){

document.getElementById("splash").style.display="none";
document.getElementById("mainContent").style.display="block";

music.src=playlist[currentSong];
music.play();

});

/* AUTO NEXT SONG */
music.addEventListener("ended",function(){

currentSong++;

if(currentSong>=playlist.length){
currentSong=0;
}

music.src=playlist[currentSong];
music.play();

});

/* PLAY / PAUSE BUTTON */
document.getElementById("playPauseBtn").addEventListener("click",function(){

if(music.paused){
music.play();
this.textContent="Pause";
}else{
music.pause();
this.textContent="Play";
}

});

/* NEXT BUTTON */
document.getElementById("nextBtn").addEventListener("click",function(){

currentSong++;

if(currentSong>=playlist.length){
currentSong=0;
}

music.src=playlist[currentSong];
music.play();

});

/* PREVIOUS BUTTON */
document.getElementById("prevBtn").addEventListener("click",function(){

currentSong--;

if(currentSong<0){
currentSong=playlist.length-1;
}

music.src=playlist[currentSong];
music.play();

});

</script>

</body>
</html>
